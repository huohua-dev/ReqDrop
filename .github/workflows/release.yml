name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build

      - name: Upload jar as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: reqdrop-jar
          path: build/libs/reqdrop.jar

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp build/libs/reqdrop.jar "reqdrop-${GITHUB_REF_NAME}.jar"
          gh release create "$GITHUB_REF_NAME" "reqdrop-${GITHUB_REF_NAME}.jar" \
            --title "ReqDrop $GITHUB_REF_NAME" \
            --generate-notes
